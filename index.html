function toBase64(file) {
  return new Promise(function(res,rej) {
    if(file.type==="application/pdf") {
      var r=new FileReader();
      r.onload=function(){res(r.result.split(",")[1]);};
      r.onerror=rej; r.readAsDataURL(file); return;
    }
    var img=new Image(), url=URL.createObjectURL(file);
    img.onload=function() {
      var MAX=800,w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      var cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(cv.toDataURL("image/jpeg",0.6).split(",")[1]);
    };
    img.onerror=rej; img.src=url;
  });
}

      var limitedFiles = files.slice(0,3);

        var f = limitedFiles[i];
        var b64 = await toBase64(f);

      var resp, att = 0;
      while (att < 5) {
        att++;
        if(att===1) await new Promise(function(r){setTimeout(r,300);});
        resp = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{"Content-Type":"application/json", "x-api-key":apiKey, "anthropic-version":"2023-06-01"},
          body:JSON.stringify({model:"claude-haiku-4-5-20251001", max_tokens:3000, messages:[{role:"user", content:parts}]})
        });
        if (resp.status===429||resp.status===529||resp.status===503) {
          var wait = att===1?5000:att===2?10000:att===3?20000:30000;
          setLoadMsg("요청 한도 초과 — "+att+"회 재시도 ("+Math.round(wait/1000)+"초 대기)");
          await new Promise(function(r){setTimeout(r,wait);});
          continue;
        }
        break;
      }
      if (!resp.ok) throw new Error("API "+resp.status);
      var data = await resp.json();
      var raw = (data.content||[]).map(function(c){return c.text||"";}).join("");
      var clean = raw.replace(/```json|```/g,"").trim();
      if(!clean.endsWith("}")) {
        var lb = clean.lastIndexOf("},");
        clean = lb>0 ? clean.substring(0,lb+1)+"}},\"summary\":\"검토 완료\"}" : "{\"results\":{},\"summary\":\"다시 시도해 주세요\"}";
      }
      var parsed;
      try { parsed = JSON.parse(clean); }

      var r={}, n={};
      Object.entries(parsed.results||{}).forEach(function(entry){

            {[["pass","적합",counts.pass],["fail","누락/미비",counts.fail],["na","해당없음",counts.na],["unknown","미검토",counts.unknown]].map(function(arr){
              return <div key={arr[0]} style={{background:SC[arr[0]].bg,border:"1px solid "+SC[arr[0]].border,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                <div style={{fontSize:24,fontWeight:700,color:SC[arr[0]].text}}>{arr[2]}</div>
                <div style={{fontSize:11,color:SC[arr[0]].text,marginTop:2}}>{arr[1]}</div>
              </div>;
            })}
          </div>
          {rgroups.length>1&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:"1rem"}}>
            {rgroups.map(function(g){
              var gp=g.items.filter(function(i){return reviewResults[i.id]==="pass";}).length;
              var gf=g.items.filter(function(i){return reviewResults[i.id]==="fail";}).length;
              var tc=TAG_COLORS[g.tag]||DTC;
              var isSel=curGroup&&curGroup.tag===g.tag;
              return <button key={g.tag} onClick={function(){setActiveGroup(g.tag);}} style={{padding:"5px 11px",borderRadius:20,fontSize:11,fontWeight:isSel?700:400,cursor:"pointer",background:isSel?tc.bg:"#fff",color:isSel?tc.color:C.gray,border:"1px solid "+(isSel?tc.border:"#e5e7eb"),display:"flex",alignItems:"center",gap:4}}>
                {gf>0&&<span style={{width:6,height:6,borderRadius:"50%",background:C.red,display:"inline-block"}}/>}
                {g.tag} {gp}/{g.items.length}
              </button>;
            })}
          </div>}
          <div style={{background:C.cardBg,borderRadius:12,boxShadow:"0 1px 6px rgba(0,0,0,0.08)",overflow:"hidden"}}>
            <div style={{background:"linear-gradient(135deg,"+C.navy+","+C.navyMid+")",padding:"10px 16px",display:"flex",justifyContent:"space-between"}}>
              <span style={{color:C.text,fontWeight:600,fontSize:13}}>{curGroup?curGroup.tag:""}</span>
              <span style={{color:C.textSub,fontSize:12}}>적합 {curGroup?curGroup.items.filter(function(i){return reviewResults[i.id]==="pass";}).length:0} / {curGroup?curGroup.items.length:0}</span>
            </div>
            {(curGroup?curGroup.items:[]).map(function(item,idx,arr){
              var s=reviewResults[item.id]||"unknown";
              return <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderBottom:idx<arr.length-1?"1px solid #f3f4f6":"none",background:s==="fail"?"#fff8f8":"#fff"}}>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontSize:13,color:C.navy,fontWeight:500}}>{getText(item.label)}</p>
                  {reviewNotes[item.id]&&<p style={{margin:"2px 0 0",fontSize:11,color:C.gray}}>{reviewNotes[item.id]}</p>}
                </div>
                <span style={{padding:"4px 12px",borderRadius:6,fontSize:12,fontWeight:700,background:SC[s].bg,color:SC[s].text,border:"1px solid "+SC[s].border,flexShrink:0}}>{SC[s].label}</span>
              </div>;
            })}
          </div>
        </div>
      </div>
    </div>;
  }
  // MAIN
  var myHist=history.filter(function(h){return currentUser&&currentUser.role!=="admin"?h.user===currentUser.name:true;});
  return <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
    <Sidebar cu={currentUser} sel={null} onSel={startReview} onAdmin={function(){setScreen("admin");}} onLogout={function(){setCurrentUser(null);setScreen("login");}} hist={history}/>
    <div style={{flex:1,padding:"1.5rem",overflowY:"auto"}}>
      <div style={{background:"linear-gradient(135deg,"+C.navy+","+C.navyLt+")",borderRadius:14,padding:"1.5rem 2rem",marginBottom:"1.5rem",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <p style={{margin:"0 0 4px",fontSize:12,color:C.textSub}}>안녕하세요,</p>
          <h2 style={{margin:0,fontSize:22,fontWeight:700,color:"#fff"}}>{currentUser?currentUser.name:""}님</h2>
          <p style={{margin:0,fontSize:13,color:C.textSub}}>안전작업허가서 AI 자동 검토 시스템 v7</p>
        </div>
        <span style={{fontSize:52}}>🏭</span>
      </div>
      {/* API 키 설정 */}
      <div style={{background:C.cardBg,borderRadius:12,boxShadow:"0 1px 5px rgba(0,0,0,0.07)",padding:"1rem 1.25rem",marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:18}}>🔑</span>
        <div style={{flex:1}}>
          <p style={{margin:"0 0 4px",fontSize:12,color:C.gray}}>Anthropic API 키</p>
          <input type="password" value={apiKey} onChange={function(e){saveApiKey(e.target.value);}} placeholder="sk-ant-api03-..." style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #e5e7eb",fontSize:13,color:C.navy,outline:"none"}}/>
        </div>
        <div>
          {apiKey
            ? <span style={{fontSize:11,padding:"3px 9px",borderRadius:20,background:C.greenBg,color:C.green,fontWeight:600}}>✅ 설정됨</span>
            : <span style={{fontSize:11,padding:"3px 9px",borderRadius:20,background:C.redBg,color:C.red,fontWeight:600}}>❌ 미설정</span>}
        </div>
      </div>
      <div style={{background:C.cardBg,borderRadius:12,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",overflow:"hidden"}}>
        <div style={{background:"linear-gradient(135deg,"+C.navy+","+C.navyMid+")",padding:"12px 16px"}}>
          <span style={{color:C.text,fontWeight:600,fontSize:14}}>🔍 허가서 유형 선택</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,padding:"1.25rem"}}>
          {CATEGORIES.map(function(cat){
            var cnt=myHist.filter(function(h){return h.category===cat.label;}).length;
            return <button key={cat.id} onClick={function(){startReview(cat.id);}} style={{background:cat.bg,border:"1px solid "+cat.border,borderRadius:10,padding:"14px 16px",cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",gap:6}}>
              <span style={{fontSize:26}}>{cat.emoji}</span>
              <p style={{margin:0,fontSize:13,fontWeight:600,color:cat.color,lineHeight:1.4}}>{cat.label}</p>
              <p style={{margin:0,fontSize:11,color:cat.color,opacity:0.75}}>{cnt}건 검토</p>
            </button>;
          })}
        </div>
      </div>
    </div>
  </div>;
}

function CriteriaTagView(props) {
  var items=props.items, groups=[], gMap={};
  items.forEach(function(i){var t=getTag(i.label);if(!gMap[t]){gMap[t]=[];groups.push({tag:t,items:gMap[t]});}gMap[t].push(i);});
  return <div style={{padding:"10px 14px"}}>
    {groups.map(function(g){
      var tc=TAG_COLORS[g.tag]||DTC;
      return <div key={g.tag} style={{marginBottom:8}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:4,background:tc.bg,border:"1px solid "+tc.border,borderRadius:"5px 5px 0 0",padding:"3px 10px"}}>
          <span style={{fontSize:11,fontWeight:700,color:tc.color}}>■ {g.tag} ({g.items.length})</span>
        </div>
        <div style={{background:tc.bg,border:"1px solid "+tc.border,borderRadius:"0 5px 5px 5px",padding:"6px 8px",display:"flex",flexWrap:"wrap",gap:4}}>
          {g.items.map(function(i){return <span key={i.id} style={{fontSize:11,padding:"3px 9px",background:"#fff",border:"1px solid "+tc.border,borderRadius:20,color:tc.color}}>{getText(i.label)}</span>;})}
        </div>
      </div>;
    })}
  </div>;
}

function LoadingScreen(props) {
  return <div style={{display:"flex",height:"100vh",background:C.navy,alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
    <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
    <span style={{fontSize:48}}>{props.cat?props.cat.emoji:""}</span>
    <div style={{width:44,height:44,borderRadius:"50%",border:"3px solid "+C.navyLt,borderTop:"3px solid "+C.accent,animation:"spin 0.9s linear infinite"}}/>
    <p style={{color:C.text,fontSize:15,fontWeight:600,margin:0}}>{props.cat?props.cat.label:""} 검토 중...</p>
    <p style={{color:C.textSub,fontSize:13,margin:0}}>{props.msg}</p>
  </div>;
}

function Sidebar(props) {
  var cu=props.cu,sel=props.sel,onSel=props.onSel,onAdmin=props.onAdmin,onLogout=props.onLogout,hist=props.hist,active=props.active;
  var counts={};
  CATEGORIES.forEach(function(c){counts[c.id]=hist.filter(function(h){return h.category===c.label&&(cu&&cu.role==="admin"||h.user===(cu?cu.name:""));}).length;});
  return <div style={{width:220,background:C.navy,display:"flex",flexDirection:"column",minHeight:"100vh",flexShrink:0}}>
    <div style={{padding:"1.25rem 1rem",borderBottom:"1px solid "+C.border}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <span style={{fontSize:22}}>🏭</span>
        <span style={{color:C.text,fontWeight:700,fontSize:13,lineHeight:1.4}}>안전작업허가서 검토</span>
      </div>
      <span style={{fontSize:10,color:C.textSub,background:C.navyLt,padding:"2px 7px",borderRadius:10}}>AI 자동검토 v7</span>
    </div>
    <div style={{padding:"10px 12px",borderBottom:"1px solid "+C.border,display:"flex",alignItems:"center",gap:8}}>
      <div style={{width:30,height:30,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:700}}>{cu&&cu.name?cu.name[0]:"U"}</div>
      <div><p style={{margin:0,fontSize:12,color:C.text,fontWeight:600}}>{cu?cu.name:""}</p>
      <p style={{margin:0,fontSize:10,color:C.textSub}}>{cu&&cu.role==="admin"?"👑 관리자":"👤 일반"}</p></div>
    </div>
    <div style={{flex:1,padding:"8px 0",overflowY:"auto"}}>
      <p style={{margin:"8px 12px 4px",fontSize:10,color:C.textSub,fontWeight:600}}>허가서 유형</p>
      {CATEGORIES.map(function(cat){return <button key={cat.id} onClick={function(){onSel(cat.id);}} style={{width:"100%",padding:"8px 14px",background:sel===cat.id?C.accent+"22":"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8,borderLeft:sel===cat.id?"3px solid "+C.accent:"3px solid transparent"}}>
        <span style={{fontSize:16}}>{cat.emoji}</span>
        <span style={{flex:1,fontSize:12,color:sel===cat.id?C.text:C.textSub,textAlign:"left"}}>{cat.label}</span>
        {counts[cat.id]>0&&<span style={{fontSize:10,background:C.navyLt,color:C.textSub,padding:"1px 5px",borderRadius:8}}>{counts[cat.id]}</span>}
      </button>;})}
      {cu&&cu.role==="admin"&&<div>
        <p style={{margin:"12px 12px 4px",fontSize:10,color:C.textSub,fontWeight:600}}>관리</p>
        <button onClick={onAdmin} style={{width:"100%",padding:"8px 14px",background:active==="admin"?C.gold+"22":"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8,borderLeft:active==="admin"?"3px solid "+C.gold:"3px solid transparent"}}>
          <span>👥</span><span style={{fontSize:12,color:active==="admin"?C.gold:C.textSub}}>회원 관리</span>
        </button>
      </div>}
    </div>
    <div style={{padding:"10px 12px",borderTop:"1px solid "+C.border}}>
      <button onClick={onLogout} style={{width:"100%",padding:"8px",background:"transparent",border:"1px solid "+C.border,borderRadius:7,cursor:"pointer",color:C.textSub,fontSize:12}}>🚪 로그아웃</button>
    </div>
  </div>;
}

function AuthScreen(props) {
  var screen=props.screen,setScreen=props.setScreen,users=props.users,onLogin=props.onLogin,onRegister=props.onRegister,apiKey=props.apiKey,onSaveApiKey=props.onSaveApiKey;
  var [id,setId]=React.useState(""), [name,setName]=React.useState(""), [pw,setPw]=React.useState(""), [pw2,setPw2]=React.useState(""), [err,setErr]=React.useState("");
  var isLogin=screen==="login";
  function login(){
    var u=users.find(function(x){return x.id===id&&x.password===pw;});
    if(!u){setErr("아이디 또는 비밀번호 오류");return;}
    if(u.status==="blocked"){setErr("차단된 계정입니다");return;}
    onLogin(u);
  }
  function register(){
    if(!id||!name||!pw){setErr("모든 항목을 입력하세요");return;}
    if(id.length<4){setErr("아이디는 4자 이상");return;}
    if(pw.length<6){setErr("비밀번호는 6자 이상");return;}
    if(pw!==pw2){setErr("비밀번호 불일치");return;}
    if(users.find(function(u){return u.id===id;})){setErr("이미 사용 중인 아이디");return;}
    onRegister(users.concat([{id:id,name:name,password:pw,role:"user",status:"active",createdAt:new Date().toISOString()}]));
  }
  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,"+C.navy+","+C.navyLt+")",display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
    <div style={{width:"100%",maxWidth:420}}>
      <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
        <div style={{fontSize:54,marginBottom:10}}>🏭</div>
        <h1 style={{margin:0,fontSize:20,fontWeight:700,color:"#fff"}}>안전작업허가서 검토 시스템</h1>
        <span style={{fontSize:11,color:C.textSub}}>AI 자동검토 v7</span>
      </div>
      <div style={{background:"rgba(255,255,255,0.05)",borderRadius:14,border:"1px solid "+C.border,overflow:"hidden",marginBottom:12}}>
        <div style={{display:"flex",borderBottom:"1px solid "+C.border}}>
          {[["login","로그인"],["register","회원가입"]].map(function(arr){return <button key={arr[0]} onClick={function(){setScreen(arr[0]);setErr("");}} style={{flex:1,padding:"12px",background:screen===arr[0]?C.accent+"33":"transparent",border:"none",cursor:"pointer",color:screen===arr[0]?"#fff":C.textSub,fontSize:13,fontWeight:screen===arr[0]?700:400,borderBottom:screen===arr[0]?"2px solid "+C.accent:"2px solid transparent"}}>{arr[1]}</button>;})}
        </div>
        <div style={{padding:"1.25rem"}}>
          {err&&<div style={{background:"rgba(220,38,38,0.15)",color:"#fca5a5",border:"1px solid rgba(220,38,38,0.3)",borderRadius:7,padding:"8px 12px",marginBottom:"1rem",fontSize:12}}>⚠️ {err}</div>}
          {(isLogin?[["아이디",id,setId,"text"],["비밀번호",pw,setPw,"password"]]:[["아이디(4자↑)",id,setId,"text"],["이름",name,setName,"text"],["비밀번호(6자↑)",pw,setPw,"password"],["비밀번호확인",pw2,setPw2,"password"]]).map(function(arr){return <div key={arr[0]} style={{marginBottom:10}}>
            <label style={{fontSize:12,color:C.textSub,display:"block",marginBottom:4}}>{arr[0]}</label>
            <input type={arr[3]} value={arr[1]} onChange={function(e){arr[2](e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&isLogin)login();}} placeholder={arr[0]+" 입력"} style={{width:"100%",padding:"9px 11px",borderRadius:8,border:"1px solid "+C.border,background:"rgba(255,255,255,0.08)",color:"#fff",fontSize:13,outline:"none"}}/>
          </div>;})}
          <button onClick={isLogin?login:register} style={{width:"100%",padding:11,borderRadius:9,border:"none",background:C.accent,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>{isLogin?"로그인":"가입하기"}</button>
        </div>
      </div>
      {/* API 키 입력 */}
      <div style={{background:"rgba(255,255,255,0.05)",borderRadius:10,border:"1px solid "+C.border,padding:"1rem"}}>
        <p style={{margin:"0 0 6px",fontSize:12,color:C.textSub}}>🔑 Anthropic API 키 설정</p>
        <input type="password" value={apiKey} onChange={function(e){onSaveApiKey(e.target.value);}} placeholder="sk-ant-api03-..." style={{width:"100%",padding:"9px 11px",borderRadius:8,border:"1px solid "+C.border,background:"rgba(255,255,255,0.08)",color:"#fff",fontSize:12,outline:"none",marginBottom:6}}/>
        <p style={{margin:0,fontSize:10,color:C.textSub}}>※ API 키는 이 브라우저에만 저장됩니다 · <a href="https://console.anthropic.com" target="_blank" style={{color:C.accent}}>발급받기</a></p>
      </div>
    </div>
  </div>;
}

function AdminContent(props) {
  var users=props.users,history=props.history,onSave=props.onSave,onBack=props.onBack;
  var [tab,setTab]=React.useState("users");
  return <div style={{flex:1,padding:"2rem",overflowY:"auto"}}>
    <div style={{maxWidth:700}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:"1.5rem"}}>
        <button onClick={onBack} style={{background:C.navyMid,border:"none",color:C.textSub,cursor:"pointer",padding:"6px 12px",borderRadius:6,fontSize:13}}>← 메인</button>
        <h2 style={{margin:0,fontSize:18,fontWeight:700,color:C.navy}}>👥 관리자 패널</h2>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:"1rem"}}>
        {[["users","👤 회원 관리"],["history","📋 검토 이력"]].map(function(arr){return <button key={arr[0]} onClick={function(){setTab(arr[0]);}} style={{padding:"7px 16px",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:600,border:"1px solid "+(tab===arr[0]?C.accent:"#e5e7eb"),background:tab===arr[0]?C.accent:"#fff",color:tab===arr[0]?"#fff":C.gray}}>{arr[1]}</button>;})}
      </div>
      {tab==="users"&&<div style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 5px rgba(0,0,0,0.07)",overflow:"hidden"}}>
        <div style={{background:"linear-gradient(135deg,"+C.navy+","+C.navyMid+")",padding:"10px 16px"}}><span style={{color:C.text,fontWeight:600,fontSize:13}}>회원 목록 ({users.length}명)</span></div>
        {users.map(function(u,i,arr){return <div key={u.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderBottom:i<arr.length-1?"1px solid #f3f4f6":"none"}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:u.role==="admin"?C.gold+"33":C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:u.role==="admin"?C.amber:C.gray}}>{u.name?u.name[0]:""}</div>
          <div style={{flex:1}}><p style={{margin:0,fontSize:13,fontWeight:600,color:C.navy}}>{u.name} <span style={{fontSize:11,color:C.gray}}>({u.id})</span></p></div>
          <select value={u.role} onChange={function(e){if(u.id==="admin")return;onSave(users.map(function(x){return x.id===u.id?Object.assign({},x,{role:e.target.value}):x;}));}} disabled={u.id==="admin"} style={{fontSize:11,padding:"2px 5px",border:"1px solid #e5e7eb",borderRadius:5}}>
            <option value="admin">👑 관리자</option><option value="user">👤 일반</option>
          </select>
          <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:600,background:u.status==="blocked"?C.redBg:C.greenBg,color:u.status==="blocked"?C.red:C.green}}>{u.status==="blocked"?"차단":"활성"}</span>
          {u.id!=="admin"&&<div style={{display:"flex",gap:2}}>
            <button onClick={function(){onSave(users.map(function(x){return x.id===u.id?Object.assign({},x,{status:x.status==="blocked"?"active":"blocked"}):x;}));}} style={{background:"none",border:"none",cursor:"pointer",fontSize:14}}>{u.status==="blocked"?"🔓":"🔒"}</button>
            <button onClick={function(){onSave(users.filter(function(x){return x.id!==u.id;}));}} style={{background:"none",border:"none",cursor:"pointer",fontSize:14}}>🗑️</button>
          </div>}
        </div>;})}
      </div>}
      {tab==="history"&&<div style={{background:"#fff",borderRadius:10,boxShadow:"0 1px 5px rgba(0,0,0,0.07)",overflow:"hidden"}}>
        <div style={{background:"linear-gradient(135deg,"+C.navy+","+C.navyMid+")",padding:"10px 16px"}}><span style={{color:C.text,fontWeight:600,fontSize:13}}>전체 검토 이력 ({history.length}건)</span></div>
        {history.length===0&&<p style={{padding:"2rem",textAlign:"center",fontSize:13,color:C.gray}}>검토 이력이 없습니다.</p>}
        {history.slice(0,50).map(function(h,i,arr){
          var pass=Object.values(h.results).filter(function(v){return v==="pass";}).length;
          var fail=Object.values(h.results).filter(function(v){return v==="fail";}).length;
          var cat=CATEGORIES.find(function(c){return c.label===h.category;});
          return <div key={h.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",borderBottom:i<arr.length-1?"1px solid #f3f4f6":"none"}}>
            <span style={{fontSize:18}}>{cat?cat.emoji:"📄"}</span>
            <div style={{flex:1}}><p style={{margin:0,fontSize:13,fontWeight:600,color:C.navy}}>{h.category}</p>
            <p style={{margin:0,fontSize:11,color:C.gray}}>{h.user} · {h.date}</p></div>
            <span style={{fontSize:12,padding:"2px 8px",borderRadius:20,background:C.greenBg,color:C.green,fontWeight:600}}>✅ {pass}</span>
            {fail>0&&<span style={{fontSize:12,padding:"2px 8px",borderRadius:20,background:C.redBg,color:C.red,fontWeight:600}}>❌ {fail}</span>}
          </div>;
        })}
      </div>}
    </div>
  </div>;
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
